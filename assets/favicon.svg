<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8906F"/>
      <stop offset="1" stop-color="#D97757"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#1F1E1C"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#3A3532" stroke-width="1.2"/>

  <!-- Session (5h) ~ 35% -->
  <rect x="12" y="19" width="40" height="5" rx="2.5" fill="#332E2B"/>
  <rect x="12" y="19" width="14" height="5" rx="2.5" fill="url(#coral)"/>

  <!-- Weekly ~ 75% -->
  <rect x="12" y="30" width="40" height="5" rx="2.5" fill="#332E2B"/>
  <rect x="12" y="30" width="30" height="5" rx="2.5" fill="url(#coral)"/>

  <!-- Sonnet weekly ~ 12% -->
  <rect x="12" y="41" width="40" height="5" rx="2.5" fill="#332E2B"/>
  <rect x="12" y="41" width="5" height="5" rx="2.5" fill="url(#coral)" opacity="0.75"/>
</svg>
